<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.15" />
    </linearGradient>
  </defs>

  <!-- Background pill -->
  <rect x="2" y="2" width="476" height="156" rx="24" fill="url(#grad2)" stroke="url(#grad1)" stroke-width="2"/>

  <!-- Left node icon -->
  <circle cx="60" cy="80" r="22" fill="url(#grad1)" opacity="0.9"/>
  <text x="60" y="86" text-anchor="middle" fill="white" font-family="monospace" font-size="16" font-weight="bold">A</text>

  <!-- Connection line with arrow -->
  <line x1="86" y1="80" x2="140" y2="80" stroke="url(#grad1)" stroke-width="3" stroke-dasharray="8,4"/>
  <polygon points="140,74 152,80 140,86" fill="url(#grad1)"/>

  <!-- SSH tunnel icon -->
  <rect x="155" y="62" width="56" height="36" rx="6" fill="url(#grad1)" opacity="0.12" stroke="url(#grad1)" stroke-width="1.5"/>
  <text x="183" y="85" text-anchor="middle" fill="#2563eb" font-family="monospace" font-size="13" font-weight="bold">SSH</text>

  <!-- Connection line with arrow -->
  <line x1="215" y1="80" x2="260" y2="80" stroke="url(#grad1)" stroke-width="3" stroke-dasharray="8,4"/>
  <polygon points="260,74 272,80 260,86" fill="url(#grad1)"/>

  <!-- Right node icon -->
  <circle cx="294" cy="80" r="22" fill="url(#grad1)" opacity="0.9"/>
  <text x="294" y="86" text-anchor="middle" fill="white" font-family="monospace" font-size="16" font-weight="bold">B</text>

  <!-- Title text -->
  <text x="390" y="68" text-anchor="middle" fill="#1e293b" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" letter-spacing="-0.5">A2A</text>
  <text x="390" y="100" text-anchor="middle" fill="url(#grad1)" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700">SSH Skill</text>

  <!-- Subtitle -->
  <text x="240" y="148" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">Agent-to-Agent Delegation over SSH</text>
</svg>
