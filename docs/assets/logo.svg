<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)" filter="url(#shadow)"/>
  <!-- Agent A circle -->
  <circle cx="36" cy="44" r="16" fill="white" opacity="0.95"/>
  <text x="36" y="50" text-anchor="middle" fill="#2563eb" font-family="system-ui,sans-serif" font-size="18" font-weight="800">A</text>
  <!-- Agent B circle -->
  <circle cx="92" cy="84" r="16" fill="white" opacity="0.95"/>
  <text x="92" y="90" text-anchor="middle" fill="#7c3aed" font-family="system-ui,sans-serif" font-size="18" font-weight="800">B</text>
  <!-- Diagonal connection arrow A→B -->
  <line x1="50" y1="54" x2="76" y2="74" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
  <polygon points="78,72 72,78 82,78" fill="white" opacity="0.85"/>
  <!-- Diagonal return arrow B→A -->
  <line x1="78" y1="78" x2="52" y2="58" stroke="white" stroke-width="2" stroke-linecap="round" stroke-dasharray="4,3" opacity="0.5"/>
  <!-- SSH badge -->
  <rect x="34" y="96" width="60" height="22" rx="11" fill="white" opacity="0.2"/>
  <text x="64" y="112" text-anchor="middle" fill="white" font-family="monospace" font-size="14" font-weight="700" letter-spacing="3" opacity="0.95">SSH</text>
</svg>
